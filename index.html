
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HEIC→JPG" />
  <title>HEIC → JPG Converter</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --accent:   #e8ff47;
      --accent2:  #ff6b35;
      --text:     #f0f0f0;
      --muted:    #666;
      --success:  #4ade80;
      --error:    #f87171;
      --radius:   16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent);
    }
    .badge-offline {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      padding: 4px 10px;
      border-radius: 20px;
      background: #1e2a00;
      color: var(--accent);
      border: 1px solid #3a5200;
      letter-spacing: 0.1em;
    }

    /* ── Hero ── */
    .hero {
      padding: 32px 20px 8px;
    }
    .hero h1 {
      font-size: clamp(32px, 8vw, 48px);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    .hero h1 span.heic {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: var(--accent2);
      text-decoration-thickness: 3px;
    }
    .hero h1 span.jpg {
      color: var(--accent);
    }
    .hero p {
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Drop Zone ── */
    main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
      position: relative;
      background: var(--surface);
    }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: #1e2a00;
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }
    .drop-zone h2 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .drop-zone p {
      font-size: 13px;
      color: var(--muted);
    }
    .drop-zone .pick-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 24px;
      background: var(--accent);
      color: #0f0f0f;
      font-weight: 600;
      font-size: 14px;
      border-radius: 40px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .drop-zone .pick-btn:active { transform: scale(0.96); }

    /* ── Settings ── */
    .settings-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .setting {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 14px;
      font-size: 13px;
      flex: 1;
      min-width: 140px;
    }
    .setting label { color: var(--muted); white-space: nowrap; }
    .setting select {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      outline: none;
      flex: 1;
      cursor: pointer;
    }
    .setting select option { background: #1a1a1a; }

    /* Quality pill buttons */
    .quality-pills {
      display: flex;
      gap: 6px;
      flex: 1;
    }
    .q-pill {
      flex: 1;
      padding: 4px 0;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      text-align: center;
    }
    .q-pill.active {
      background: var(--accent);
      color: #0f0f0f;
      border-color: var(--accent);
    }

    /* ── Queue ── */
    .queue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .queue-header h3 {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }
    .clear-btn {
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--error); }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s;
    }
    .file-item.done   { border-color: #1a3a1a; }
    .file-item.error  { border-color: #3a1a1a; }
    .file-item.active { border-color: var(--accent); }

    .file-thumb {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--border);
      object-fit: cover;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      overflow: hidden;
    }
    .file-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'Space Mono', monospace;
    }

    .file-progress {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .file-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }
    .file-item.done .file-progress-bar { background: var(--success); width: 100%; }
    .file-item.error .file-progress-bar { background: var(--error); }

    .file-action {
      flex-shrink: 0;
    }
    .dl-btn {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.1s;
      text-decoration: none;
      display: inline-block;
    }
    .dl-btn:active { transform: scale(0.95); }
    .status-icon { font-size: 18px; }

    /* ── Convert Button ── */
    .convert-row {
      display: flex;
      gap: 12px;
      padding: 4px 0 8px;
    }
    .convert-btn {
      flex: 1;
      padding: 16px;
      background: var(--accent);
      color: #0f0f0f;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: transform 0.1s, opacity 0.2s;
    }
    .convert-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .convert-btn:not(:disabled):active { transform: scale(0.98); }

    .dl-all-btn {
      width: 100%;
      padding: 16px;
      background: var(--surface);
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s, background 0.15s;
      letter-spacing: 0.02em;
    }
    .dl-all-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .dl-all-btn:not(:disabled):hover { background: #1e2a00; }
    .dl-all-btn:not(:disabled):active { transform: scale(0.98); }

    /* ── Stats ── */
    .stats-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      gap: 0;
    }
    .stat {
      flex: 1;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-val {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    /* ── Empty state ── */
    .empty { display: none; }
    .has-files .empty { display: none; }

    /* ── Scrollable list ── */
    .list-wrap {
      max-height: 50vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 2px;
    }
    .list-wrap::-webkit-scrollbar { width: 4px; }
    .list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Install prompt ── */
    #install-banner {
      display: none;
      margin: 0 20px 16px;
      background: #1e2a00;
      border: 1px solid #3a5200;
      border-radius: var(--radius);
      padding: 14px 16px;
      gap: 12px;
      align-items: center;
    }
    #install-banner.show { display: flex; }
    #install-banner p { flex: 1; font-size: 13px; color: var(--text); }
    #install-banner p strong { color: var(--accent); }
    .install-btn {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .dismiss-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

  <header>
    <span class="logo">HEIC→JPG</span>
    <span class="badge-offline" id="offline-badge">● OFFLINE READY</span>
  </header>

  <div class="hero">
    <h1><span class="heic">HEIC</span> → <span class="jpg">JPG</span></h1>
    <p>Convert photos on your device — nothing leaves your phone.</p>
  </div>

  <div id="install-banner">
    <p><strong>Install app</strong> for faster access &amp; full offline use</p>
    <button class="install-btn" id="install-btn">Install</button>
    <button class="dismiss-btn" id="dismiss-install">✕</button>
  </div>

  <main>
    <!-- Drop zone -->
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".heic,.heif,image/heic,image/heif" multiple />
      <span class="drop-icon">🖼️</span>
      <h2>Drop HEIC photos here</h2>
      <p>or tap to pick from your gallery</p>
      <span class="pick-btn">Choose Photos</span>
    </div>

    <!-- Settings -->
    <div class="settings-bar">
      <div class="setting">
        <label>Format</label>
        <select id="fmt-select">
          <option value="image/jpeg">JPG</option>
          <option value="image/png">PNG</option>
          <option value="image/webp">WebP</option>
        </select>
      </div>
      <div class="setting">
        <label>Quality</label>
        <div class="quality-pills">
          <button class="q-pill" data-val="0.75">75%</button>
          <button class="q-pill active" data-val="0.90">90%</button>
          <button class="q-pill" data-val="1.00">100%</button>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar" style="display:none">
      <div class="stat">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-label">Files</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-done">0</div>
        <div class="stat-label">Done</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-saved">—</div>
        <div class="stat-label">Saved</div>
      </div>
    </div>

    <!-- Convert & Download All -->
    <div class="convert-row" id="convert-row" style="display:none">
      <button class="convert-btn" id="convert-btn">Convert All</button>
    </div>
    <button class="dl-all-btn" id="dl-all-btn" disabled>⬇ Download All as ZIP</button>

    <!-- File list -->
    <div id="queue-section" style="display:none">
      <div class="queue-header">
        <h3>Queue</h3>
        <button class="clear-btn" id="clear-btn">Clear all</button>
      </div>
      <div class="list-wrap" id="file-list"></div>
    </div>
  </main>

  <!-- heic2any from CDN (cached by SW) -->
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    // ── State ────────────────────────────────────────────────
    const files = [];   // { file, id, status, blob, url, origSize }
    let nextId = 0;
    let deferredPrompt = null;

    // ── DOM refs ─────────────────────────────────────────────
    const dropZone    = document.getElementById('drop-zone');
    const fileInput   = document.getElementById('file-input');
    const fileList    = document.getElementById('file-list');
    const convertBtn  = document.getElementById('convert-btn');
    const dlAllBtn    = document.getElementById('dl-all-btn');
    const clearBtn    = document.getElementById('clear-btn');
    const queueSec    = document.getElementById('queue-section');
    const convertRow  = document.getElementById('convert-row');
    const statsBar    = document.getElementById('stats-bar');
    const fmtSelect   = document.getElementById('fmt-select');
    // ── Quality pills ─────────────────────────────────────────
    let selectedQuality = 0.90;
    document.querySelectorAll('.q-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.q-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedQuality = parseFloat(btn.dataset.val);
      });
    });

    // ── Drag & drop ───────────────────────────────────────────
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      addFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

    // ── Add files ─────────────────────────────────────────────
    function addFiles(newFiles) {
      const heicFiles = newFiles.filter(f =>
        f.type === 'image/heic' || f.type === 'image/heif' ||
        f.name.toLowerCase().endsWith('.heic') || f.name.toLowerCase().endsWith('.heif')
      );
      if (!heicFiles.length) {
        alert('Please select HEIC or HEIF image files.');
        return;
      }
      heicFiles.forEach(f => {
        const id = nextId++;
        files.push({ file: f, id, status: 'pending', blob: null, url: null, origSize: f.size });
        renderItem(id);
      });
      fileInput.value = '';
      updateUI();
    }

    // ── Render a queue item ───────────────────────────────────
    function renderItem(id) {
      const item = files.find(f => f.id === id);
      const div = document.createElement('div');
      div.className = 'file-item';
      div.id = `item-${id}`;
      div.innerHTML = `
        <div class="file-thumb" id="thumb-${id}">📷</div>
        <div class="file-info">
          <div class="file-name">${escHtml(item.file.name)}</div>
          <div class="file-meta" id="meta-${id}">${fmtSize(item.file.size)} · pending</div>
          <div class="file-progress"><div class="file-progress-bar" id="bar-${id}"></div></div>
        </div>
        <div class="file-action" id="action-${id}">
          <span class="status-icon">⏳</span>
        </div>`;
      fileList.appendChild(div);
    }

    // ── Update a rendered item ────────────────────────────────
    function updateItem(id) {
      const item = files.find(f => f.id === id);
      const el   = document.getElementById(`item-${id}`);
      const meta = document.getElementById(`meta-${id}`);
      const bar  = document.getElementById(`bar-${id}`);
      const act  = document.getElementById(`action-${id}`);
      const thmb = document.getElementById(`thumb-${id}`);
      if (!el) return;

      if (item.status === 'converting') {
        el.className = 'file-item active';
        meta.textContent = `${fmtSize(item.file.size)} · converting…`;
        bar.style.width = '60%';
        act.innerHTML = '<span class="status-icon">⚙️</span>';
      } else if (item.status === 'done') {
        el.className = 'file-item done';
        const ext = fmtSelect.value === 'image/jpeg' ? 'jpg' : fmtSelect.value === 'image/png' ? 'png' : 'webp';
        const saved = item.origSize - item.blob.size;
        const savedPct = Math.round((saved / item.origSize) * 100);
        meta.textContent = `${fmtSize(item.blob.size)} · ${savedPct > 0 ? '−' + savedPct + '%' : '+' + Math.abs(savedPct) + '%'}`;
        bar.style.width = '100%';
        if (item.url) {
          const img = document.createElement('img');
          img.src = item.url;
          thmb.innerHTML = '';
          thmb.appendChild(img);
        }
        const outName = item.file.name.replace(/\.(heic|heif)$/i, '.' + ext);
        act.innerHTML = `<a class="dl-btn" href="${item.url}" download="${outName}">Save</a>`;
      } else if (item.status === 'error') {
        el.className = 'file-item error';
        meta.textContent = 'Conversion failed';
        bar.style.width = '100%';
        bar.style.background = 'var(--error)';
        act.innerHTML = '<span class="status-icon">❌</span>';
      }
    }

    // ── Convert logic ─────────────────────────────────────────
    convertBtn.addEventListener('click', convertAll);

    async function convertAll() {
      const pending = files.filter(f => f.status === 'pending' || f.status === 'error');
      if (!pending.length) return;

      convertBtn.disabled = true;
      convertBtn.textContent = 'Converting…';

      for (const item of pending) {
        item.status = 'converting';
        updateItem(item.id);

        try {
          const resultBlob = await heic2any({
            blob: item.file,
            toType: fmtSelect.value,
            quality: selectedQuality,
            multiple: false
          });
          const blob = Array.isArray(resultBlob) ? resultBlob[0] : resultBlob;
          item.blob   = blob;
          item.url    = URL.createObjectURL(blob);
          item.status = 'done';
        } catch (err) {
          console.error(err);
          item.status = 'error';
        }
        updateItem(item.id);
        updateStats();
      }

      convertBtn.disabled = false;
      convertBtn.textContent = 'Convert All';
      dlAllBtn.disabled = files.filter(f => f.status === 'done').length === 0;
    }

    // ── Download All as ZIP ───────────────────────────────────
    dlAllBtn.addEventListener('click', async () => {
      const done = files.filter(f => f.status === 'done');
      if (!done.length) return;

      dlAllBtn.disabled = true;
      dlAllBtn.textContent = '⏳ Zipping…';

      const ext = fmtSelect.value === 'image/jpeg' ? 'jpg' : fmtSelect.value === 'image/png' ? 'png' : 'webp';
      const zip = new JSZip();

      for (const item of done) {
        const fname = item.file.name.replace(/\.(heic|heif)$/i, '.' + ext);
        zip.file(fname, item.blob);
      }

      const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 3 } });
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `converted-photos-${done.length}.zip`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 5000);

      dlAllBtn.textContent = '⬇ Download All as ZIP';
      dlAllBtn.disabled = false;
    });

    // ── Clear ─────────────────────────────────────────────────
    clearBtn.addEventListener('click', () => {
      files.forEach(f => { if (f.url) URL.revokeObjectURL(f.url); });
      files.length = 0;
      fileList.innerHTML = '';
      updateUI();
    });

    // ── Stats ─────────────────────────────────────────────────
    function updateStats() {
      const done  = files.filter(f => f.status === 'done');
      const total = files.length;
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-done').textContent  = done.length;
      if (done.length > 0) {
        const origTotal  = done.reduce((a, f) => a + f.origSize, 0);
        const convTotal  = done.reduce((a, f) => a + f.blob.size, 0);
        const saved = origTotal - convTotal;
        document.getElementById('stat-saved').textContent = saved > 0
          ? '−' + fmtSize(saved)
          : '+' + fmtSize(Math.abs(saved));
      }
    }

    function updateUI() {
      const hasFiles = files.length > 0;
      queueSec.style.display   = hasFiles ? 'flex' : 'none';
      queueSec.style.flexDirection = 'column';
      queueSec.style.gap = '8px';
      convertRow.style.display = hasFiles ? 'flex' : 'none';
      statsBar.style.display   = hasFiles ? 'flex' : 'none';
      updateStats();
      const doneCnt = files.filter(f => f.status === 'done').length;
      dlAllBtn.disabled = doneCnt === 0;
    }

    // ── Helpers ───────────────────────────────────────────────
    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── PWA Install ───────────────────────────────────────────
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').classList.add('show');
    });
    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('install-banner').classList.remove('show');
    });
    document.getElementById('dismiss-install').addEventListener('click', () => {
      document.getElementById('install-banner').classList.remove('show');
    });

    // ── Service Worker ────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('SW registered', reg.scope);
      }).catch(err => console.warn('SW failed', err));
    }

    // ── Offline badge ─────────────────────────────────────────
    function updateOfflineBadge() {
      const badge = document.getElementById('offline-badge');
      if (navigator.onLine) {
        badge.textContent = '● ONLINE';
        badge.style.background = '#001a2a';
        badge.style.color = '#7dd3fc';
        badge.style.borderColor = '#0369a1';
      } else {
        badge.textContent = '● OFFLINE';
        badge.style.background = '#1e2a00';
        badge.style.color = 'var(--accent)';
        badge.style.borderColor = '#3a5200';
      }
    }
    window.addEventListener('online',  updateOfflineBadge);
    window.addEventListener('offline', updateOfflineBadge);
    updateOfflineBadge();
  </script>
</body>
</html>
