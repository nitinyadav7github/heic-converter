<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HEIC→JPG" />
  <title>HEIC → JPG Converter</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
    :root {
      --bg:#0f0f0f; --surface:#1a1a1a; --border:#2a2a2a;
      --accent:#e8ff47; --accent2:#ff6b35;
      --text:#f0f0f0; --muted:#666;
      --success:#4ade80; --error:#f87171; --radius:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}

    header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--accent)}
    .badge{font-size:10px;font-family:'Space Mono',monospace;padding:4px 10px;border-radius:20px;background:#1e2a00;color:var(--accent);border:1px solid #3a5200;letter-spacing:.1em}

    .hero{padding:28px 20px 4px}
    .hero h1{font-size:clamp(30px,8vw,46px);font-weight:600;line-height:1.1;letter-spacing:-.03em}
    .hero h1 .heic{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--accent2);text-decoration-thickness:3px}
    .hero h1 .jpg{color:var(--accent)}
    .hero p{margin-top:8px;font-size:13px;color:var(--muted);line-height:1.5}

    main{flex:1;padding:16px 20px 24px;display:flex;flex-direction:column;gap:14px}

    /* Drop zone */
    .drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px 20px;text-align:center;cursor:pointer;position:relative;background:var(--surface);transition:border-color .2s,background .2s}
    .drop-zone.drag-over{border-color:var(--accent);background:#1e2a00}
    .drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .drop-icon{font-size:36px;margin-bottom:10px;display:block}
    .drop-zone h2{font-size:15px;font-weight:500;margin-bottom:4px}
    .drop-zone p{font-size:12px;color:var(--muted)}
    .pick-btn{display:inline-block;margin-top:14px;padding:10px 24px;background:var(--accent);color:#0f0f0f;font-weight:700;font-size:14px;border-radius:40px;cursor:pointer;transition:transform .1s}
    .pick-btn:active{transform:scale(.96)}

    /* Settings */
    .settings-bar{display:flex;gap:10px;flex-wrap:wrap}
    .setting{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:8px 14px;font-size:13px;flex:1;min-width:130px}
    .setting label{color:var(--muted);white-space:nowrap}
    .setting select{background:transparent;border:none;color:var(--text);font-size:13px;font-family:'Space Mono',monospace;outline:none;flex:1;cursor:pointer}
    .setting select option{background:#1a1a1a}
    .quality-pills{display:flex;gap:5px;flex:1}
    .q-pill{flex:1;padding:4px 0;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-family:'Space Mono',monospace;font-weight:700;cursor:pointer;transition:background .15s,color .15s,border-color .15s;text-align:center}
    .q-pill.active{background:var(--accent);color:#0f0f0f;border-color:var(--accent)}

    /* Stats */
    .stats-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;gap:0}
    .stat{flex:1;text-align:center;border-right:1px solid var(--border)}
    .stat:last-child{border-right:none}
    .stat-val{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--accent)}
    .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

    /* Speed badge */
    .speed-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-family:'Space Mono',monospace}
    .speed-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .speed-dot.idle{animation:none;background:var(--border)}

    /* File list */
    .queue-header{display:flex;align-items:center;justify-content:space-between}
    .queue-header h3{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;font-family:'Space Mono',monospace}
    .clear-btn{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:8px;transition:color .15s}
    .clear-btn:hover{color:var(--error)}

    .list-wrap{max-height:48vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:2px}
    .list-wrap::-webkit-scrollbar{width:3px}
    .list-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    .file-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:11px;transition:border-color .2s}
    .file-item.done{border-color:#1a3a1a}
    .file-item.error{border-color:#3a1a1a}
    .file-item.active{border-color:var(--accent)}

    .file-thumb{width:42px;height:42px;border-radius:8px;background:var(--border);object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
    .file-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px}

    .file-info{flex:1;min-width:0}
    .file-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .file-meta{font-size:11px;color:var(--muted);margin-top:2px;font-family:'Space Mono',monospace}
    .file-progress{height:3px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
    .file-progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .2s}
    .file-item.done .file-progress-bar{background:var(--success);width:100%!important}
    .file-item.error .file-progress-bar{background:var(--error)}

    .file-action{flex-shrink:0}
    .dl-btn{background:var(--accent);color:#0f0f0f;border:none;border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:transform .1s;text-decoration:none;display:inline-block}
    .dl-btn:active{transform:scale(.95)}
    .status-icon{font-size:17px}

    /* Action buttons */
    .action-row{display:none;flex-direction:column;gap:10px;padding-bottom:4px}
    .action-row.visible{display:flex}
    .dl-all-btn{width:100%;padding:15px;background:var(--surface);color:var(--accent);font-size:15px;font-weight:700;border:1.5px solid var(--accent);border-radius:var(--radius);cursor:pointer;transition:transform .1s,opacity .2s,background .15s;letter-spacing:.02em}
    .dl-all-btn:disabled{opacity:.25;cursor:not-allowed}
    .dl-all-btn:not(:disabled):hover{background:#1e2a00}
    .dl-all-btn:not(:disabled):active{transform:scale(.98)}

    /* Install banner */
    #install-banner{display:none;margin:0 20px 12px;background:#1e2a00;border:1px solid #3a5200;border-radius:var(--radius);padding:13px 15px;gap:12px;align-items:center}
    #install-banner.show{display:flex}
    #install-banner p{flex:1;font-size:13px;color:var(--text)}
    #install-banner p strong{color:var(--accent)}
    .install-btn{background:var(--accent);color:#0f0f0f;border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
    .dismiss-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px}

    @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  </style>
</head>
<body>

<header>
  <span class="logo">HEIC→JPG</span>
  <span class="badge" id="offline-badge">● OFFLINE READY</span>
</header>

<div class="hero">
  <h1><span class="heic">HEIC</span> → <span class="jpg">JPG</span></h1>
  <p>Lightning-fast conversion — all on your device, nothing uploaded.</p>
</div>

<div id="install-banner">
  <p><strong>Install app</strong> for offline use &amp; home screen access</p>
  <button class="install-btn" id="install-btn">Install</button>
  <button class="dismiss-btn" id="dismiss-install">✕</button>
</div>

<main>
  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".heic,.heif,image/heic,image/heif" multiple />
    <span class="drop-icon">🖼️</span>
    <h2>Drop HEIC photos here</h2>
    <p>Converts instantly as you pick</p>
    <span class="pick-btn">Choose Photos</span>
  </div>

  <!-- Settings -->
  <div class="settings-bar">
    <div class="setting">
      <label>Format</label>
      <select id="fmt-select">
        <option value="image/jpeg">JPG</option>
        <option value="image/png">PNG</option>
        <option value="image/webp">WebP</option>
      </select>
    </div>
    <div class="setting">
      <label>Quality</label>
      <div class="quality-pills">
        <button class="q-pill" data-val="0.75">75%</button>
        <button class="q-pill active" data-val="0.90">90%</button>
        <button class="q-pill" data-val="1.00">100%</button>
      </div>
    </div>
  </div>

  <!-- Stats + speed indicator -->
  <div id="stats-bar" class="stats-bar" style="display:none">
    <div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Files</div></div>
    <div class="stat"><div class="stat-val" id="stat-done">0</div><div class="stat-label">Done</div></div>
    <div class="stat"><div class="stat-val" id="stat-saved">—</div><div class="stat-label">Saved</div></div>
    <div class="stat"><div class="stat-val" id="stat-speed">—</div><div class="stat-label">Avg/photo</div></div>
  </div>

  <!-- Download All -->
  <div class="action-row" id="action-row">
    <button class="dl-all-btn" id="dl-all-btn" disabled>⬇ Download All as ZIP</button>
  </div>

  <!-- Queue -->
  <div id="queue-section" style="display:none;flex-direction:column;gap:8px">
    <div class="queue-header">
      <h3 id="queue-title">Queue</h3>
      <button class="clear-btn" id="clear-btn">Clear all</button>
    </div>
    <div class="list-wrap" id="file-list"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/heic-to@1.4.2/dist/iife/heic-to.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────
const queue = [];        // { file, id, status, blob, url, origSize, ms }
let nextId = 0;
let deferredPrompt = null;
let selectedQuality = 0.90;
let converting = 0;
const PARALLEL = 3;      // process up to 3 at once
const timings = [];      // ms per completed photo

// ── DOM ────────────────────────────────────────────────────────────
const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const fileList   = document.getElementById('file-list');
const dlAllBtn   = document.getElementById('dl-all-btn');
const clearBtn   = document.getElementById('clear-btn');
const queueSec   = document.getElementById('queue-section');
const actionRow  = document.getElementById('action-row');
const statsBar   = document.getElementById('stats-bar');
const fmtSelect  = document.getElementById('fmt-select');

// ── Quality pills ──────────────────────────────────────────────────
document.querySelectorAll('.q-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.q-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedQuality = parseFloat(btn.dataset.val);
  });
});

// ── Drag & drop ────────────────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); addFiles([...e.dataTransfer.files]); });
fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

// ── Add files → immediately start converting ───────────────────────
function addFiles(newFiles) {
  const heicFiles = newFiles.filter(f =>
    f.type === 'image/heic' || f.type === 'image/heif' ||
    f.name.toLowerCase().endsWith('.heic') || f.name.toLowerCase().endsWith('.heif')
  );
  if (!heicFiles.length) { alert('Please select HEIC / HEIF files.'); return; }

  heicFiles.forEach(f => {
    const id = nextId++;
    queue.push({ file: f, id, status: 'pending', blob: null, url: null, origSize: f.size, ms: 0 });
    renderItem(id);
  });
  updateUI();
  drainQueue();   // start converting immediately
}

// ── Parallel queue drain ────────────────────────────────────────────
function drainQueue() {
  const pending = queue.filter(f => f.status === 'pending');
  const slots   = PARALLEL - converting;
  pending.slice(0, slots).forEach(item => convertOne(item));
}

async function convertOne(item) {
  converting++;
  item.status = 'converting';
  updateItem(item.id);

  const t0 = performance.now();
  try {
    // heic-to uses libheif WASM — much faster than heic2any
    const blob = await HeicTo({
      blob: item.file,
      type: fmtSelect.value,
      quality: selectedQuality
    });
    item.ms     = Math.round(performance.now() - t0);
    item.blob   = blob;
    item.url    = URL.createObjectURL(blob);
    item.status = 'done';
    timings.push(item.ms);
  } catch (err) {
    console.error(err);
    item.status = 'error';
  }

  converting--;
  updateItem(item.id);
  updateStats();
  drainQueue();   // pick up next pending item
}

// ── Render item ────────────────────────────────────────────────────
function renderItem(id) {
  const item = queue.find(f => f.id === id);
  const div = document.createElement('div');
  div.className = 'file-item active';
  div.id = `item-${id}`;
  div.innerHTML = `
    <div class="file-thumb" id="thumb-${id}">📷</div>
    <div class="file-info">
      <div class="file-name">${escHtml(item.file.name)}</div>
      <div class="file-meta" id="meta-${id}">${fmtSize(item.file.size)} · queued</div>
      <div class="file-progress"><div class="file-progress-bar" id="bar-${id}" style="width:15%"></div></div>
    </div>
    <div class="file-action" id="action-${id}"><span class="status-icon">⏳</span></div>`;
  fileList.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── Update item ────────────────────────────────────────────────────
function updateItem(id) {
  const item = queue.find(f => f.id === id);
  const el   = document.getElementById(`item-${id}`);
  const meta = document.getElementById(`meta-${id}`);
  const bar  = document.getElementById(`bar-${id}`);
  const act  = document.getElementById(`action-${id}`);
  const thmb = document.getElementById(`thumb-${id}`);
  if (!el) return;

  if (item.status === 'converting') {
    el.className = 'file-item active';
    meta.textContent = `${fmtSize(item.file.size)} · converting…`;
    bar.style.width = '55%';
    act.innerHTML = '<span class="status-icon">⚙️</span>';
    // Animate progress bar
    let w = 55;
    const tick = setInterval(() => {
      w = Math.min(w + 3, 92);
      if (bar) bar.style.width = w + '%';
      const cur = queue.find(f => f.id === id);
      if (!cur || cur.status !== 'converting') clearInterval(tick);
    }, 200);

  } else if (item.status === 'done') {
    el.className = 'file-item done';
    const ext = fmtSelect.value === 'image/jpeg' ? 'jpg' : fmtSelect.value === 'image/png' ? 'png' : 'webp';
    const saved = item.origSize - item.blob.size;
    const pct   = Math.round((saved / item.origSize) * 100);
    const timeStr = item.ms < 1000 ? item.ms + 'ms' : (item.ms/1000).toFixed(1) + 's';
    meta.textContent = `${fmtSize(item.blob.size)} · ${pct > 0 ? '−'+pct+'%' : '+'+Math.abs(pct)+'%'} · ⚡${timeStr}`;
    if (item.url) {
      const img = document.createElement('img');
      img.src = item.url; thmb.innerHTML = ''; thmb.appendChild(img);
    }
    const outName = item.file.name.replace(/\.(heic|heif)$/i, '.' + ext);
    act.innerHTML = `<a class="dl-btn" href="${item.url}" download="${outName}">Save</a>`;

  } else if (item.status === 'error') {
    el.className = 'file-item error';
    meta.textContent = 'Conversion failed — try again';
    bar.style.width = '100%';
    bar.style.background = 'var(--error)';
    act.innerHTML = '<span class="status-icon">❌</span>';
  }
}

// ── Stats ──────────────────────────────────────────────────────────
function updateStats() {
  const done  = queue.filter(f => f.status === 'done');
  document.getElementById('stat-total').textContent = queue.length;
  document.getElementById('stat-done').textContent  = done.length;

  if (done.length > 0) {
    const origTotal = done.reduce((a, f) => a + f.origSize, 0);
    const convTotal = done.reduce((a, f) => a + f.blob.size, 0);
    const saved = origTotal - convTotal;
    document.getElementById('stat-saved').textContent = saved > 0 ? '−'+fmtSize(saved) : '+'+fmtSize(Math.abs(saved));
  }

  if (timings.length > 0) {
    const avg = Math.round(timings.reduce((a,b) => a+b, 0) / timings.length);
    document.getElementById('stat-speed').textContent = avg < 1000 ? avg+'ms' : (avg/1000).toFixed(1)+'s';
  }

  const doneCnt = done.length;
  dlAllBtn.disabled = doneCnt === 0;
  dlAllBtn.textContent = doneCnt > 0
    ? `⬇ Download All ${doneCnt} as ZIP`
    : '⬇ Download All as ZIP';
}

function updateUI() {
  const hasFiles = queue.length > 0;
  queueSec.style.display  = hasFiles ? 'flex' : 'none';
  actionRow.classList.toggle('visible', hasFiles);
  statsBar.style.display  = hasFiles ? 'flex' : 'none';
  // update queue title
  const pending = queue.filter(f => f.status === 'pending' || f.status === 'converting').length;
  document.getElementById('queue-title').textContent = pending > 0 ? `Queue · ${pending} converting…` : 'Queue';
  updateStats();
}

// ── Download All as ZIP ────────────────────────────────────────────
dlAllBtn.addEventListener('click', async () => {
  const done = queue.filter(f => f.status === 'done');
  if (!done.length) return;
  dlAllBtn.disabled = true;
  dlAllBtn.textContent = '⏳ Zipping…';

  const ext = fmtSelect.value === 'image/jpeg' ? 'jpg' : fmtSelect.value === 'image/png' ? 'png' : 'webp';
  const zip = new JSZip();
  done.forEach(item => zip.file(item.file.name.replace(/\.(heic|heif)$/i, '.'+ext), item.blob));

  const zipBlob = await zip.generateAsync({ type:'blob', compression:'DEFLATE', compressionOptions:{level:3} });
  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a');
  a.href = url; a.download = `converted-${done.length}-photos.zip`; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);

  dlAllBtn.textContent = `⬇ Download All ${done.length} as ZIP`;
  dlAllBtn.disabled = false;
});

// ── Clear ──────────────────────────────────────────────────────────
clearBtn.addEventListener('click', () => {
  queue.forEach(f => { if (f.url) URL.revokeObjectURL(f.url); });
  queue.length = 0; timings.length = 0;
  fileList.innerHTML = '';
  updateUI();
});

// ── Helpers ────────────────────────────────────────────────────────
function fmtSize(b) {
  if (b < 1024) return b+' B';
  if (b < 1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── PWA Install ────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
});
document.getElementById('dismiss-install').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('show');
});

// ── Service Worker ─────────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// ── Offline badge ──────────────────────────────────────────────────
function updateBadge() {
  const b = document.getElementById('offline-badge');
  if (navigator.onLine) { b.textContent='● ONLINE'; b.style.cssText='background:#001a2a;color:#7dd3fc;border-color:#0369a1'; }
  else { b.textContent='● OFFLINE'; b.style.cssText=''; }
}
window.addEventListener('online', updateBadge);
window.addEventListener('offline', updateBadge);
updateBadge();
</script>
</body>
</html>
